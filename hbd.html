<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Donna! 🎉</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-romantic">

    <div class="container hbd-container">
        
        <!-- Bagian Foto Utama dan GIF Kucing Kiri-Kanan -->
        <div class="photo-and-cats-wrapper" style="display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 25px;">
            <!-- GIF Kucing Kiri -->
            <img src="https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExMXE0eDZrYzhsMHV4bnJtcm1kZGcya3JvZWNnNnRkYWZwdG54M2x6dCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/1JmGiBtqTuehfYxuy9/giphy.gif" alt="Cat Left" style="width: 120px; height: auto;">
            
            <!-- Foto 1 (Tengah) -->
            <img src="foto1.png" alt="Donna" class="foto-utama" style="margin: 0;">
            
            <!-- GIF Kucing Kanan -->
            <img src="https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExNm0yYjhyejhlYTF2d203M21hbjhlMnMwOXlvaHdrdW82cGpqaTFsZCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/qFmdpUKAFZ6rMobzzu/giphy.gif" alt="Cat Right" style="width: 120px; height: auto;">
        </div>

        <!-- Teks Ucapan -->
        <div class="text-box">
            <!-- Judul Menggunakan Animasi CSS -->
            <h2><span class="typing-effect">Selamat ulang tahun ke-22, Donna Permatasari Kesayangan Ku ❤️</span></h2>
            
            <!-- Wadah Paragraf Panjang (Akan Diisi Otomatis oleh JavaScript) -->
            <p id="p1" style="font-size: 1rem; line-height: 1.6; margin-bottom: 15px; text-align: justify;"></p>
            <p id="p2" style="font-size: 1rem; line-height: 1.6; margin-bottom: 15px; text-align: justify;"></p>
            <p id="p3" style="font-size: 1rem; line-height: 1.6; margin-bottom: 15px; text-align: justify;"></p>
            <p id="p4" style="font-size: 1rem; line-height: 1.6; margin-bottom: 15px; text-align: justify;"></p>
            <p id="p5" style="font-size: 1rem; line-height: 1.6; margin-bottom: 15px; text-align: justify;"></p>
            <p id="p6" style="font-size: 1rem; line-height: 1.6; margin-bottom: 15px; text-align: justify;"></p>
        </div>

        <!-- Galeri Foto Berputar (Carousel 3D untuk foto2 sampai foto16) -->
        <div class="gallery-container">
            <div class="spin-container">
                <img src="foto2.png" alt="Donna 2">
                <img src="foto3.png" alt="Donna 3">
                <img src="foto4.png" alt="Donna 4">
                <img src="foto5.png" alt="Donna 5">
                <img src="foto6.png" alt="Donna 6">
                <img src="foto7.png" alt="Donna 7">
                <img src="foto8.png" alt="Donna 8">
                <img src="foto9.png" alt="Donna 9">
                <img src="foto10.png" alt="Donna 10">
                <img src="foto11.png" alt="Donna 11">
                <img src="foto12.png" alt="Donna 12">
                <img src="foto13.png" alt="Donna 13">
                <img src="foto14.png" alt="Donna 14">
                <img src="foto15.png" alt="Donna 15">
                <img src="foto16.png" alt="Donna 16">
            </div>
        </div>

        <!-- Tombol Lanjut -->
        <div class="btn-wrapper">
            <button class="next-btn" onclick="window.location.href='uterakhir.html'">Klik Ya Sayang 👉</button>
        </div>
    </div>

    <!-- Elemen Audio untuk Meneruskan Lagu -->
    <audio id="backsound" src="akaza_theme.mp3" loop></audio>

    <script>
        // 1. Mengatur posisi rotasi foto secara otomatis agar melingkar
        var imgs = document.querySelectorAll('.spin-container img');
        var numImgs = imgs.length;
        imgs.forEach(function(img, index) {
            var angle = index * (360 / numImgs);
            img.style.transform = "rotateY(" + angle + "deg) translateZ(250px)";
            img.style.transition = "transform 1s";
        });

        // 2. Data Paragraf Ucapan Panjang
        const paragraphs = [
            { id: "p1", text: "Hari ini adalah hari spesial karena 22 tahun yang lalu lahir seseorang yang sekarang menjadi orang yang sangat berarti dalam hidupku. Terima kasih sudah hadir, memberikan warna, kebahagiaan, dan banyak kenangan indah dalam setiap hariku." },
            { id: "p2", text: "Di usiamu yang ke-22 ini, aku berharap semua impian dan cita-citamu bisa terwujud satu per satu. Semoga kamu selalu diberikan kesehatan, kebahagiaan, rezeki yang melimpah, serta kekuatan untuk menghadapi setiap tantangan yang datang." },
            { id: "p3", text: "Aku juga berharap hubungan kita bisa terus tumbuh menjadi lebih baik, lebih kuat, dan penuh dengan cinta serta pengertian." },
            { id: "p4", text: "Terima kasih karena selalu berusaha, selalu peduli, dan selalu menjadi dirimu sendiri." },
            { id: "p5", text: "Nikmati hari spesialmu ya, sayang. Semoga tahun ini menjadi tahun yang penuh keberuntungan dan kebahagiaan untukmu. Aku akan selalu mendukungmu dan mendoakan yang terbaik untukmu." },
            { id: "p6", text: "Selamat ulang tahun ke-22, cintaku. Aku sayang kamu hari ini, besok, dan selamanyaaaa. 🎂🎉❤️" }
        ];

        let pIndex = 0;
        let charIndex = 0;
        const speed = 25; // Kecepatan mengetik per huruf (makin kecil makin cepat)

        function typeWriterAll() {
            if (pIndex < paragraphs.length) {
                let currentP = paragraphs[pIndex];
                let element = document.getElementById(currentP.id);
                
                if (element && charIndex < currentP.text.length) {
                    element.innerHTML += currentP.text.charAt(charIndex);
                    charIndex++;
                    setTimeout(typeWriterAll, speed);
                } else {
                    // Paragraf saat ini selesai, pindah ke paragraf berikutnya
                    pIndex++;
                    charIndex = 0;
                    setTimeout(typeWriterAll, 200); // Jeda singkat antar paragraf
                }
            }
        }

        // 3. Menjalankan Musik & Efek Ketik secara bersamaan saat halaman dibuka
        var audio = document.getElementById('backsound');
        
        window.addEventListener('DOMContentLoaded', function() {
            // Jalankan pengetesan musik
            if (localStorage.getItem('musicPlaying') === 'true') {
                var savedTime = localStorage.getItem('musicCurrentTime');
                if (savedTime) {
                    audio.currentTime = parseFloat(savedTime);
                }
                audio.play().catch(function(err) {
                    console.log("Autoplay musik ditahan:", err);
                });

                // Sinkronisasi detik musik terus berjalan
                setInterval(function() {
                    localStorage.setItem('musicCurrentTime', audio.currentTime);
                }, 100);
            }
            
            // PAKSA JALANKAN EFEK KETIK TANPA MENUNGGU GAMBAR SELESAI LOAD
            setTimeout(typeWriterAll, 500); 
        });
    </script>
</body>
</html>
