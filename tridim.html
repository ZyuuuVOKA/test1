<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spesial Untukmu Donna ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #050210;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
            cursor: grab;
            pointer-events: auto;
            user-select: none;
        }
        
        body:active {
            cursor: grabbing;
        }

        /* --- LATAR BELAKANG LUAR ANGKASA & BINTANG KELAP-KELIP --- */
        .space-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1b0a2a 0%, #050210 100%);
            z-index: -2;
            pointer-events: none;
        }

        .space-bg::after {
            content: "";
            position: absolute;
            width: 3px;
            height: 3px;
            background: transparent;
            box-shadow: 
                10vw 20vh #fff, 35vw 45vh #fff, 75vw 15vh #ffb3c1, 85vw 75vh #fff,
                20vw 80vh #fff, 50vw 10vh #ff477e, 65vw 60vh #fff, 90vw 30vh #fff,
                5vw 60vh #fff, 40vw 90vh #fff, 70vw 85vh #ff85a1, 15vw 35vh #fff;
            border-radius: 50%;
            animation: twinkle 3s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* --- EFEK BINTANG JATUH (METEOR SHOWER) --- */
        .shooting-stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            transform: rotate(-25deg);
        }

        .star {
            position: absolute;
            left: 0;
            top: 0;
            height: 2px;
            background: linear-gradient(-45deg, #ffffff, rgba(0, 0, 255, 0));
            border-radius: 999px;
            filter: drop-shadow(0 0 6px #ff85a1);
            animation: tail 3s ease-in-out infinite, shooting 3s ease-in-out infinite;
            opacity: 0;
        }

        @keyframes tail {
            0% { width: 0; }
            30% { width: 100px; }
            100% { width: 0; }
        }

        @keyframes shooting {
            0% { transform: translateX(0); opacity: 0; }
            10% { opacity: 1; }
            30% { transform: translateX(400px); opacity: 0; }
            100% { transform: translateX(400px); opacity: 0; }
        }

        /* Pengaturan posisi acak & kecepatan 10 bintang jatuh */
        .star:nth-child(1) { top: 10%; left: 20%; animation-delay: 0s; animation-duration: 3.5s; }
        .star:nth-child(2) { top: 30%; left: 40%; animation-delay: 0.8s; animation-duration: 2.8s; }
        .star:nth-child(3) { top: 15%; left: 70%; animation-delay: 1.5s; animation-duration: 4s; }
        .star:nth-child(4) { top: 50%; left: 10%; animation-delay: 0.3s; animation-duration: 3.2s; }
        .star:nth-child(5) { top: 70%; left: 60%; animation-delay: 2.2s; animation-duration: 2.5s; }
        .star:nth-child(6) { top: 25%; left: 85%; animation-delay: 1.1s; animation-duration: 3.7s; }
        .star:nth-child(7) { top: 60%; left: 30%; animation-delay: 1.9s; animation-duration: 3s; }
        .star:nth-child(8) { top: 80%; left: 15%; animation-delay: 0.5s; animation-duration: 4.2s; }
        .star:nth-child(9) { top: 5%; left: 50%; animation-delay: 2.7s; animation-duration: 2.9s; }
        .star:nth-child(10) { top: 40%; left: 75%; animation-delay: 1.3s; animation-duration: 3.4s; }

        /* --- STAGE UTAMA 3D --- */
        .scene {
            width: 0;
            height: 0;
            position: relative;
            transform-style: preserve-3d;
            pointer-events: none;
        }

        .heart-container {
            width: 0;
            height: 0;
            position: absolute;
            transform-style: preserve-3d;
            transform: rotateX(-10deg) rotateY(0deg);
        }

        /* --- TEKS I LOVE YOU DENGAN ANIMASI BERKEDIP (FADING GLOW) --- */
        .text-node {
            position: absolute;
            color: #ff477e;
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            font-size: 14px;
            white-space: nowrap;
            transform-style: preserve-3d;
            backface-visibility: visible;
            
            /* Animasi redup-terang melingkar lembut */
            animation: pulseGlow 2s ease-in-out infinite alternate;
        }

        @keyframes pulseGlow {
            0% {
                opacity: 0.05;
                text-shadow: 0 0 2px rgba(255, 10, 84, 0.1);
            }
            100% {
                opacity: 1;
                text-shadow: 0 0 12px #ff0a54, 0 0 25px #ff477e, 0 0 35px #f72585;
            }
        }

        /* --- FOTO TENGAH --- */
        .center-photo {
            position: absolute;
            width: 140px;
            height: 140px;
            left: -70px;
            top: -70px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 0 25px rgba(255, 71, 126, 0.6);
            z-index: 10;
        }

        /* --- TOMBOL KEMBALI --- */
        .back-btn {
            position: fixed;
            bottom: 30px;
            padding: 10px 25px;
            background: rgba(255, 71, 126, 0.3);
            color: white;
            border: 2px solid #ff477e;
            border-radius: 20px;
            font-family: sans-serif;
            font-weight: bold;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: 0.3s;
            z-index: 100;
            pointer-events: auto;
        }

        .back-btn:hover {
            background: #ff477e;
            box-shadow: 0 0 20px #ff0a54;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="space-bg"></div>

    <div class="shooting-stars-container">
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
    </div>

    <div class="scene">
        <img src="foto16.png" alt="Donna Sayang" class="center-photo">
        <div class="heart-container" id="heart"></div>
    </div>

    <button class="back-btn" onclick="window.location.href='index.html'">↩️ Putar Lagi</button>

    <audio id="backsound" src="akaza_theme.mp3" loop></audio>

    <script>
        // --- MUSIK PENGIRING ---
        var audio = document.getElementById('backsound');
        window.addEventListener('DOMContentLoaded', function() {
            if (localStorage.getItem('musicPlaying') === 'true') {
                var savedTime = localStorage.getItem('musicCurrentTime');
                if (savedTime) {
                    audio.currentTime = parseFloat(savedTime);
                }
                audio.play().catch(function(err) {
                    console.log("Autoplay ditolak:", err);
                });

                setInterval(function() {
                    localStorage.setItem('musicCurrentTime', audio.currentTime);
                }, 100);
            }
        });

        // --- GENERATE STRUKTUR HATI 3D AKURAT SEPERTI VIDEO ---
        var heartContainer = document.getElementById('heart');
        var totalNodes = 250; 

        for (var i = 0; i < totalNodes; i++) {
            var t = (i / totalNodes) * Math.PI * 2;
            
            var x = 16 * Math.pow(Math.sin(t), 3);
            var y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
            
            var scaleX = 14; 
            var scaleY = 14;
            
            var posX = x * scaleX;
            var posY = y * scaleY;

            // Membuat kedalaman silindris gelombang 3D
            var posZ = Math.sin(t * 3) * 60; 

            var node = document.createElement('div');
            node.className = 'text-node';
            node.innerText = 'I LOVE YOU';

            // Variasi Warna Gradasi Neon
            if (i % 3 === 0) {
                node.style.color = '#ff85a1';
            } else if (i % 3 === 1) {
                node.style.color = '#ff0a54';
            } else {
                node.style.color = '#f72585';
            }

            // MENGOCOK JEDA WAKTU ANIMASI TIAP TEKS (Biar kedipnya tidak kompak/mengalir indah acak)
            node.style.animationDelay = (Math.random() * 2) + "s";

            // Sudut rotasi melingkar mengikuti kurva hati
            var angleRot = (t * 180 / Math.PI);
            node.style.transform = "translate3d(" + posX + "px, " + posY + "px, " + posZ + "px) rotateY(" + angleRot + "deg)";
            
            heartContainer.appendChild(node);
        }

        // --- SISTEM GERAKAN INTERAKTIF DRAG 360 DERAJAT ---
        var targetX = 0, targetY = -10;
        var currentX = 0, currentY = -10;
        var isDragging = false;
        var previousMouseX = 0, previousMouseY = 0;

        function autoRotate() {
            if (!isDragging) {
                targetX += 0.2; 
            }
            
            currentX += (targetX - currentX) * 0.1;
            currentY += (targetY - currentY) * 0.1;
            
            heartContainer.style.transform = "rotateX(" + currentY + "deg) rotateY(" + currentX + "deg)";
            requestAnimationFrame(autoRotate);
        }
        autoRotate();

        function startDrag(e) {
            isDragging = true;
            previousMouseX = e.clientX || e.touches[0].clientX;
            previousMouseY = e.clientY || e.touches[0].clientY;
        }

        document.addEventListener('mousemove', doDrag);
        function doDrag(e) {
            if (!isDragging) return;
            
            var currentMouseX = e.clientX || (e.touches && e.touches[0].clientX);
            var currentMouseY = e.clientY || (e.touches && e.touches[0].clientY);

            if (!currentMouseX || !currentMouseY) return;

            var deltaX = currentMouseX - previousMouseX;
            var deltaY = currentMouseY - previousMouseY;

            targetX += deltaX * 0.4; 
            targetY -= deltaY * 0.4; 
            
            targetY = Math.max(-60, Math.min(60, targetY));

            previousMouseX = currentMouseX;
            previousMouseY = currentMouseY;
        }

        function endDrag() {
            isDragging = false;
        }

        window.addEventListener('mousedown', startDrag);
        window.addEventListener('mouseup', endDrag);

        window.addEventListener('touchstart', startDrag, { passive: true });
        window.addEventListener('touchmove', doDrag, { passive: true });
        window.addEventListener('touchend', endDrag);
    </script>
</body>
</html>
